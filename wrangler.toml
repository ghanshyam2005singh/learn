name = "learn"
main = "src/worker.py"
compatibility_date = "2024-09-23"
compatibility_flags = ["python_workers"]

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = ["/api/*"]
html_handling = "auto-trailing-slash"
not_found_handling = "404-page"

# ⚠️  REQUIRED before deployment – replace placeholder values:
#     wrangler secret put ENCRYPTION_KEY
#     wrangler secret put JWT_SECRET
# For local dev, copy both to a `.dev.vars` file (already in .gitignore).
[vars]
ENCRYPTION_KEY = "MUST_BE_SET_BEFORE_DEPLOYMENT"
JWT_SECRET = "MUST_BE_SET_BEFORE_DEPLOYMENT"

# Run `wrangler d1 create education_db` and paste the returned UUID below.
[[d1_databases]]
binding = "DB"
database_name = "education_db"
database_id = "a0021f2e-a8cc-4e20-8910-3c7290ba47a6"
